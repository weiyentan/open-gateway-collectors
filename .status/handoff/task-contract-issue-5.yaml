tier: T3
goal: "Wire all components into the collector's main orchestration loop — discover databases, read usage records, POST to the Gateway, send heartbeats when idle, and handle graceful shutdown with signal handling."

# Metadata (V2 extensions)
issue_number: 5
title: "Collector orchestration & main loop"
user_facing: false
docs_impact: false
breaking_change: false
estimated_complexity: high

acceptance_criteria:
  - "Run() iterates over all discovered databases (single DB from GATEWAY_COLLECTOR_SQLITE_PATH or scanned from GATEWAY_COLLECTOR_SQLITE_DIR)"
  - "Records are read from each database via the SQLite reader, mapped to ingest records, and POSTed to the Gateway"
  - "Hostname is resolved once at startup via os.Hostname() and passed to gateway.NewClient()"
  - "Every ingest request includes client_hostname (including heartbeat empty batches)"
  - "Cursor is updated only after a successful POST; failed POSTs do not advance the cursor"
  - "Empty-batch heartbeat is sent when no records exist and the heartbeat interval has elapsed"
  - "Signal handling (SIGINT, SIGTERM) triggers graceful shutdown with a 30s grace period; in-flight POSTs complete before exit"
  - "-version flag prints the version string and exits immediately"
  - "All log levels work correctly (debug/info/warn/error); sensitive data (token) is never logged"
  - "go build ./... && go vet ./... && go test ./... passes"

allowed_paths:
  - internal/collector/**
  - internal/heartbeat/**
  - cmd/opencode-collector/**

