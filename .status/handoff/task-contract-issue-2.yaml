tier: T3
goal: "Implement source database discovery, schema inspection, per-database UUID identity management, and cursor-based state tracking."

acceptance_criteria:
  - "DiscoverDatabases() finds .db files in a test directory (including nested subdirectories)"
  - "OpenAndInspect() correctly identifies a real OpenCode .db and rejects random non-OpenCode .db files"
  - "OpenAndInspect() returns correct DatabaseInfo metadata (path, size, time, row counts)"
  - "GetOrCreateIdentity() returns the same UUID for the same database path across multiple calls"
  - "GetOrCreateIdentity() returns different UUIDs for different database paths"
  - "Tracker.GetCursor() returns zero time for unknown/unseen databases"
  - "Tracker.SetCursor() persists and Tracker.GetCursor() retrieves correctly across restarts"

allowed_paths:
  - "internal/sqlite/"
  - "internal/identity/"
  - "internal/state/"

# No skill_hints block found in .opencode-workflow.yaml; required_skill is omitted.

forbidden_changes:
  - "Do not modify files outside allowed_paths"
  - "Do not introduce external dependencies beyond the Go standard library and github.com/google/uuid"
  - "Do not modify the Gateway API, config loading, or main entry point (those belong to issue #1)"

expected_change_types:
  - add

validation_requirements:
  - "go vet ./... passes with no warnings"
  - "All unit tests pass: go test ./internal/..."
  - "Manual verification: create a test fixture .db and run OpenAndInspect via a small test binary"

escalation_path: route_to_human

stop_conditions:
  - "More than 10 files are modified"
  - "A previously-passing test now fails"
  - "An external dependency beyond Go stdlib and github.com/google/uuid is introduced"
  - "Any existing Go source file (outside the new module files) is modified"

review_mode: mandatory
